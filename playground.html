<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="JSLab Code Playground — Write, run, and experiment with JavaScript code in a real editor.">
  <title>Playground — JSLab</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='12' fill='%23f7df1e'/><text x='50' y='65' font-size='42' font-weight='bold' text-anchor='middle' fill='%23000'>JS</text></svg>">
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="top-progress-bar"><div class="fill" id="top-fill"></div></div>
<button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">☰</button>

<nav class="sidebar" id="sidebar" aria-label="Main navigation">
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <div class="logo-icon">JS</div>
      <div class="logo-text">JS<span>Lab</span></div>
    </div>
  </div>
  <div class="sidebar-nav">
    <a href="../index.html"><span class="nav-icon">🏠</span> Home</a>
    <a href="tutorials.html"><span class="nav-icon">📖</span> Tutorials</a>
    <a href="playground.html" class="active"><span class="nav-icon">💻</span> Playground</a>
    <a href="quizzes.html"><span class="nav-icon">📝</span> Quizzes</a>
    <a href="git.html"><span class="nav-icon">🔧</span> Git Lab</a>
  </div>
  <div class="sidebar-footer">Built by Pranav Pushya<br>Frontend Engineering-1 | Chitkara University</div>
</nav>

<div class="app-container">
  <main class="main-content">
    <div class="playground-layout">

      <!-- Toolbar -->
      <div class="playground-toolbar">
        <div class="toolbar-group">
          <button class="btn btn-primary btn-sm" id="run-btn">▶ Run</button>
          <button class="btn btn-secondary btn-sm" id="clear-btn">🗑 Clear</button>
        </div>
        <div class="separator"></div>
        <div class="toolbar-group challenges-dropdown">
          <button class="btn btn-secondary btn-sm" id="challenges-btn">📋 Challenges</button>
          <div class="challenges-menu" id="challenges-menu"></div>
        </div>
        <div class="toolbar-group">
          <button class="btn btn-secondary btn-sm" id="save-btn">💾 Save</button>
          <button class="btn btn-secondary btn-sm" id="snippets-btn">📂 Snippets</button>
        </div>
        <div class="separator"></div>
        <div class="toolbar-group">
          <label style="font-size:13px;color:var(--text-secondary);">Font:
            <select id="font-size-select" class="select-wrapper" style="margin-left:4px;padding:4px 8px;background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:4px;color:var(--text-primary);font-size:13px;">
              <option value="13">13px</option>
              <option value="14" selected>14px</option>
              <option value="16">16px</option>
              <option value="18">18px</option>
            </select>
          </label>
        </div>
      </div>

      <!-- Editor + Output -->
      <div class="playground-panels">
        <div class="editor-panel">
          <div id="editor-container"></div>
        </div>
        <div class="output-panel">
          <!-- Console output -->
          <div class="console-panel" id="console-panel">
            <div class="console-header" id="console-header">
              <span>Console Output</span>
              <span id="console-toggle">▾</span>
            </div>
            <div class="console-output" id="console-output"></div>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- Snippets Panel (modal) -->
<div class="modal-overlay" id="snippets-modal">
  <div class="modal" style="max-width:480px;">
    <div class="modal-header">
      <h3>💾 Saved Snippets</h3>
      <button class="modal-close" id="snippets-close" aria-label="Close">×</button>
    </div>
    <div id="snippets-list"></div>
  </div>
</div>

<button class="back-to-top" id="back-to-top" aria-label="Back to top">↑</button>
<div class="copy-toast" id="copy-toast">Copied!</div>

<script src="../js/progress.js"></script>
<script src="../js/main.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.47.0/min/vs/loader.min.js"></script>
<script src="../js/playground.js"></script>
</body>
</html>
